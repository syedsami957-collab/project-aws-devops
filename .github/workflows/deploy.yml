name: Sooch Devops

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check secrets exist
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST missing"; exit 1; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "SSH KEY missing"; exit 1; fi

      - name: Setup SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 400 key.pem

      - name: Show key file size (debug)
        run: |
          ls -l key.pem
          head -n 2 key.pem

      - name: Test SSH connection (FULL DEBUG)
        run: |
          ssh -vvv -o StrictHostKeyChecking=no -i key.pem ubuntu@${{ secrets.EC2_HOST }} "echo SUCCESS"
